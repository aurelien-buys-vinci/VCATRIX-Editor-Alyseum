<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCATRIX Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="setup-header">
        <h2><em>ALYSEUM</em> - VCATRIX editor</h2>
        <p class="subtitle">Two MIDI ports (In and Out) are required; otherwise, use Demo mode</p>
        
        <div id="midi-setup">
            <div class="port-select">
                <label for="midi-in">MIDI In port</label>
                <select id="midi-in"><option value="">Please Select</option></select>
            </div>
            <div class="port-select">
                <label for="midi-out">MIDI Out port</label>
                <select id="midi-out"><option value="">Please Select</option></select>
            </div>
        </div>
        
        <div class="header-buttons">
            <button id="btn-demo" class="btn-demo">Demo</button>
            <button id="btn-connect" class="btn-primary" disabled>Connect</button>
        </div>

        <span class="signature">Buys Aurélien</span>
    </header>

    <main id="app-container" class="hidden">
        
        <section id="fader-section">
            <div id="matrix-container">
                </div>
        </section>

        <aside id="sidebar">
            <div class="sidebar-group" style="border-top: none; padding-top: 0;">
                <button id="btn-monitor">Enable monitoring (10Hz)</button>
            </div>

            <div class="sidebar-group">
                <h3>Group mode (max 8)</h3>
                <button id="btn-multi-select" class="btn-secondary">Multi-select: OFF</button>
                <button id="btn-clear-selection" class="btn-secondary hidden">Clear selection</button>
            </div>

            <div class="sidebar-group">
                <h3>Set preset VCATRIX</h3>
                <div class="preset-grid">
                    <button class="btn-preset" data-preset="0">1</button>
                    <button class="btn-preset" data-preset="1">2</button>
                    <button class="btn-preset" data-preset="2">3</button>
                    <button class="btn-preset" data-preset="3">4</button>
                    <button class="btn-preset" data-preset="4">5</button>
                    <button class="btn-preset" data-preset="5">6</button>
                    <button class="btn-preset" data-preset="6">7</button>
                    <button class="btn-preset" data-preset="7">8</button>
                    <button class="btn-preset" data-preset="8">9</button>
                    <button class="btn-preset" data-preset="9">10</button>
                    <button class="btn-preset" data-preset="10">11</button>
                    <button class="btn-preset" data-preset="11">12</button>
                    <button class="btn-preset" data-preset="12">13</button>
                    <button class="btn-preset" data-preset="13">14</button>
                    <button class="btn-preset" data-preset="14">15</button>
                    <button class="btn-preset" data-preset="15">16</button>
                </div>
            </div>

            <div class="sidebar-group">
                <button id="btn-clear">Clear all VCA</button>
            </div>

            <div class="sidebar-group">
                <h3>Bulk dump</h3>
                <button class="btn-secondary" id="btn-dump-rx">Receive (save to Mac)</button>
                <button class="btn-secondary" id="btn-dump-tx">Transmit (load file)</button>
                <input type="file" id="file-upload" class="hidden" accept=".vca,.json">
            </div>

        </aside>

    </main>
    <div id="transmit-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Select Preset to Transmit</h3>
            <p>Choose which preset to load from the file to the VCATRIX hardware.</p>
            
            <select id="transmit-select">
                <option value="all">All Presets (1 to 16)</option>
                <option value="0">Preset 1</option>
                <option value="1">Preset 2</option>
                <option value="2">Preset 3</option>
                <option value="3">Preset 4</option>
                <option value="4">Preset 5</option>
                <option value="5">Preset 6</option>
                <option value="6">Preset 7</option>
                <option value="7">Preset 8</option>
                <option value="8">Preset 9</option>
                <option value="9">Preset 10</option>
                <option value="10">Preset 11</option>
                <option value="11">Preset 12</option>
                <option value="12">Preset 13</option>
                <option value="13">Preset 14</option>
                <option value="14">Preset 15</option>
                <option value="15">Preset 16</option>
            </select>
            
            <div class="modal-buttons">
                <button id="btn-transmit-cancel" class="btn-secondary">Cancel</button>
                <button id="btn-transmit-confirm" class="btn-primary" style="width: auto;">Confirm</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

    <script src="script.js"></script>
</body>
</html>
